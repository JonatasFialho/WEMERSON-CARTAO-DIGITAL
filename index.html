        /* =========================================
           Variáveis de Cor e Tipografia
           ========================================= */
        :root {
            --bg-color: #121212; /* Fundo principal escuro */
            --card-bg: #1a1a1a; /* Fundo do cartão levemente mais claro */
            --gold-base: #D4AF37; /* Dourado mais claro e clássico */
            --gold-light: #F3E280;
            --gold-dark: #8a6914;
            --text-light: #e0e0e0;
            --text-muted: #a0a0a0;
            
            --font-title: 'Cinzel', serif;
            --font-main: 'Montserrat', sans-serif;
            
            /* Gradiente dourado reutilizável (Brilho revertido ao original) */
            --gold-gradient: linear-gradient(to right, var(--gold-dark), var(--gold-light), var(--gold-base), var(--gold-light), var(--gold-dark));
        }

        /* =========================================
           Reset e Configurações Globais
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            /* Padrão geométrico escuro sutil ao fundo */
            background-image: 
                radial-gradient(#222 1px, transparent 1px),
                radial-gradient(#222 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            
            /* Centraliza o cartão na tela para Desktop */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-light);
            padding: 20px;
        }

        /* Classes Utilitárias */
        .text-gold {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent; /* Fallback */
            display: inline-block;
        }

        /* =========================================
           Container do Cartão (Mobile First)
           ========================================= */
        .card-container {
            width: 100%;
            max-width: 400px; /* Largura típica de celular */
            background-color: var(--card-bg);
            /* Gradiente sutil de fundo simulando material escuro */
            background: linear-gradient(145deg, #1f1f1f, #121212);
            border-radius: 35px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 
                        0 0 0 1px rgba(198, 147, 32, 0.1);
            overflow: hidden;
            position: relative;
        }

        /* =========================================
           Seção: Cabeçalho (Header)
           ========================================= */
        .header {

            padding: 40px 20px 20px;
        }

        .logo-box {

        }

        .logo-box img {

        }

        }

        .header h2 {

        }

            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Linha Curva Divisória (SVG) */
        .curved-divider {

            height: 25px;
            display: block;
            margin-bottom: 25px;
        }

        /* =========================================
           Seção: Informações Pessoais
           ========================================= */
        .personal-info {

        }

        }

        .personal-info p {
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: var(--text-light);
        }

        /* =========================================
           Seção: Botões de Ação
           ========================================= */
        .actions {
            padding: 0 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            position: relative;
            justify-content: center; /* Centraliza o texto */
            width: 100%;
            padding: 16px 15px 16px 55px; /* Padding esquerdo de 55px garante que o texto nunca encoste no ícone */
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--gold-base);
            border-radius: 50px; /* Formato pílula */
            text-decoration: none;
            color: var(--text-light);
            font-weight: 500;
            font-size: 0.82rem; /* Levemente menor para caber melhor em telas estreitas */
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn span {
            word-break: break-word; /* Permite que e-mails muito longos quebrem linha em telas minúsculas */
            text-align: center;
            line-height: 1.2;
        }

        .btn:hover, .btn:active {
            background: rgba(198, 147, 32, 0.1);
            transform: scale(0.98);
        }

        /* Círculo do ícone posicionado à esquerda */
        .btn-icon {

            left: 15px; /* Fixa à esquerda */
            width: 32px;

        .brands-grid {

    <!-- SCRIPT REAL PARA GERAR E BAIXAR O CONTATO (vCard) -->
    <script>
        function baixarContato(event) {
            event.preventDefault(); // Evita que a página role para o topo
            
            // Dados do contato para o vCard
            const nomeCompleto = "Wemerson Colins";
            const cargo = "Representante Comercial";
            const empresa = "Colins Representações";
            const telefone = "+5598981693939";
            const email = "wemersoncolins@yahoo.cm.br";
            const site = window.location.href; // Pega o link atual do cartão digital

            // Monta a estrutura padrão do arquivo .vcf (vCard 3.0)
            const vcard = `BEGIN:VCARD\nVERSION:3.0\nFN:${nomeCompleto}\nORG:${empresa}\nTITLE:${cargo}\nTEL;TYPE=cell,voice:${telefone}\nEMAIL;TYPE=work:${email}\nURL:${site}\nEND:VCARD`;

            // Cria um objeto "Blob" que simula um arquivo de texto no formato vCard
            const blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });
            
            // Cria um link temporário na memória do navegador
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            
            // Configura o link para apontar para o nosso arquivo e define o nome do download
            link.href = url;
            link.setAttribute('download', 'Colins.vcf');
            
            // Adiciona o link escondido na tela, "clica" nele automaticamente e depois o remove
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // Libera a memória
            setTimeout(() => URL.revokeObjectURL(url), 100);
        }
    </script>
